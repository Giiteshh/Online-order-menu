<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteDash | Online Ordering</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍔 BiteDash Express</h1>
        <p>Delicious food, delivered fast.</p>
    </header>

    <div class="container">
        <!-- FEATURE 1: Food Menu Display -->
        <main class="menu-section">
            <h2>Our Menu</h2>
            <div class="menu-grid">
                <!-- Item 1 -->
                <div class="menu-item">
                    <h3>Classic Cheeseburger</h3>
                    <p class="price">₹149</p>
                    <button onclick="addToOrder('Classic Cheeseburger', 149)">Add to Order</button>
                </div>
                <!-- Item 2 -->
                <div class="menu-item">
                    <h3>Peri Peri Fries</h3>
                    <p class="price">₹99</p>
                    <button onclick="addToOrder('Peri Peri Fries', 99)">Add to Order</button>
                </div>
                <!-- Item 3 -->
                <div class="menu-item">
                    <h3>Paneer Tikka Pizza</h3>
                    <p class="price">₹299</p>
                    <button onclick="addToOrder('Paneer Tikka Pizza', 299)">Add to Order</button>
                </div>
            </div>
        </main>

        <!-- FEATURE 2 & 4: Order Summary & Place Order -->
        <aside class="order-section">
            <h2>Order Summary</h2>
            <div id="cart-items">
                <p class="empty-message">Your cart is empty.</p>
            </div>
            <hr>
            <div class="total-row">
                <strong>Total:</strong>
                <span id="cart-total">₹0</span>
            </div>
            <button id="place-order-btn" onclick="generateBill()">Place Order & Generate Bill</button>
        </aside>
    </div>

    <!-- FEATURE 3: Bill Generator (Hidden Modal Pop-up) -->
    <div id="bill-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>🧾 INVOICE / BILL</h2>
            <div id="bill-details"></div>
            <button onclick="window.print()">Print Receipt</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
